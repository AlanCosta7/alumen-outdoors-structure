<!DOCTYPE html>
<html lang="en">
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">
    <meta name="description" content="Custom pool cages, extended lanais, and porch enclosures across Sarasota, Tampa, Bradenton, Venice &amp; North Port, FL. Licensed &amp; insured. Free estimates.">

    <!-- Indexing & crawl -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="Alumen Outdoors Structure">

    <!-- Brand & mobile -->
    <meta name="theme-color" content="#1a1a1a">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="msapplication-TileColor" content="#1a1a1a">

    <!-- Open Graph base (overridden per-page by useMeta) -->
    <meta property="og:site_name" content="Alumen Outdoors Structure">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://alumenoutdoors.com/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Alumen Outdoors Structure — Custom Pool Cages & Aluminum Enclosures">

    <!-- Twitter / X base -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@alumenoutdoors">
    <meta name="twitter:image" content="https://alumenoutdoors.com/og-image.jpg">

    <!-- Geo — local SEO (Sarasota HQ) -->
    <meta name="geo.region" content="US-FL">
    <meta name="geo.placename" content="Sarasota, Florida">
    <meta name="geo.position" content="27.3364;-82.5307">
    <meta name="ICBM" content="27.3364, -82.5307">

    <!-- Google Fonts — preconnect first, then stylesheet (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    </noscript>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/favicon-128x128.png">
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
